<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الصفحة التعريفية الشخصية التفاعلية</title>
    <style>
        /* التنسيقات العامة */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        .card, .comments-section, .reactions-section {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .card { text-align: center; }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #007bff;
            margin-bottom: 15px;
        }

        h1 { margin: 10px 0 5px 0; color: #2c3e50; }
        .title { color: #007bff; font-weight: bold; margin-bottom: 15px; }
        .info-text { font-size: 0.95rem; color: #666; line-height: 1.6; }

        /* تنسيق أزرار الحسابات الملونة */
        .links-container {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            color: white;
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        /* الألوان الرسمية للمنصات */
        .btn-whatsapp { background-color: #25D366; }
        .btn-instagram { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        .btn-facebook { background-color: #1877F2; }
        .btn-telegram { background-color: #26A5E4; }
        .btn-github { background-color: #24292e; }

        h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #f4f7f6; padding-bottom: 10px; }

        /* تفاعلات اللايف */
        .reactions-container {
            display: flex;
            justify-content: space-around;
            margin-top: 15px;
        }

        .reaction-btn {
            background: #f8f9fa;
            border: 1px solid #eee;
            border-radius: 50px;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transition: transform 0.2s, background 0.2s;
            user-select: none;
        }

        .reaction-btn:hover {
            transform: scale(1.1);
            background: #e9ecef;
        }

        .reaction-count { font-size: 0.85rem; color: #666; font-weight: bold; }

        .floating-emoji {
            position: fixed;
            bottom: 20px;
            font-size: 2.5rem;
            pointer-events: none;
            z-index: 9999;
            animation: floatUp 2s ease-out forwards;
            opacity: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-80vh) scale(1.2) rotate(20deg); opacity: 0; }
        }

        /* التعليقات */
        textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 10px;
        }

        .submit-btn {
            background-color: #28a745;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
        .submit-btn:hover { background-color: #218838; }

        .comments-list { margin-top: 20px; max-height: 200px; overflow-y: auto; }
        .comment-item {
            background: #f8f9fa;
            padding: 10px;
            border-right: 4px solid #007bff;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 0.9rem;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <div class="card">
        <img src="my-photo.jpg" alt="الصورة الشخصية" class="profile-img">
        <h1>خالد العنسي</h1>
        <div class="title">مطور برمجيات واعد</div>
        <p class="info-text">
            طالب في تخصص <strong>علوم الحاسوب (المستوى الثالث)</strong>.<br>
            مهتم ببناء وتطوير تطبيقات الويب والأنظمة البرمجية الذكية.
        </p>
        
        <div class="links-container">
            <a href="https://wa.me/+967775019147" target="_blank" class="btn btn-whatsapp">واتساب 💬</a>
            <a href="https://instagram.com/shblljwf7" target="_blank" class="btn btn-instagram">انستغرام 📸</a>
            <a href="https://www.facebook.com/profile.php?id=100058302622223" target="_blank" class="btn btn-facebook">فيسبوك 👤</a>
            <a href="https://t.me/Kh_l_a711" target="_blank" class="btn btn-telegram">تليجرام ✈️</a>
            <a href="https://github.com/nnne75217-kha" target="_blank" class="btn btn-github">GitHub 💻</a>
        </div>
    </div>

    <div class="reactions-section">
        <h3>تفاعلات لايف الحية ⚡</h3>
        <div class="reactions-container">
            <button class="reaction-btn" onclick="sendReaction('❤️', 'heart')">
                <span>❤️</span> <span class="reaction-count" id="heart-count">0</span>
            </button>
            <button class="reaction-btn" onclick="sendReaction('😂', 'laugh')">
                <span>😂</span> <span class="reaction-count" id="laugh-count">0</span>
            </button>
            <button class="reaction-btn" onclick="sendReaction('👏', 'clap')">
                <span>👏</span> <span class="reaction-count" id="clap-count">0</span>
            </button>
            <button class="reaction-btn" onclick="sendReaction('👍', 'like')">
                <span>👍</span> <span class="reaction-count" id="like-count">0</span>
            </button>
        </div>
    </div>

    <div class="comments-section">
        <h3>اترك تعليقاً لي ✍️</h3>
        <textarea id="commentInput" placeholder="اكتب تعليقك هنا..."></textarea>
        <button class="submit-btn" onclick="addComment()">إرسال التعليق</button>
        <div class="comments-list" id="commentsList"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            loadComments();
            loadReactions();
        });

        function sendReaction(emoji, type) {
            let counts = JSON.parse(localStorage.getItem('reactionCounts')) || { heart: 0, laugh: 0, clap: 0, like: 0 };
            counts[type] = (counts[type] || 0) + 1;
            localStorage.setItem('reactionCounts', JSON.stringify(counts));
            
            document.getElementById(type + '-count').innerText = counts[type];

            const floatingEmoji = document.createElement('div');
            floatingEmoji.className = 'floating-emoji';
            floatingEmoji.innerText = emoji;
            
            const randomX = Math.random() * 60 + 20;
            floatingEmoji.style.left = randomX + 'vw';
            
            document.body.appendChild(floatingEmoji);

            setTimeout(() => { floatingEmoji.remove(); }, 2000);
        }

        function loadReactions() {
            let counts = JSON.parse(localStorage.getItem('reactionCounts')) || { heart: 0, laugh: 0, clap: 0, like: 0 };
            document.getElementById('heart-count').innerText = counts.heart;
            document.getElementById('laugh-count').innerText = counts.laugh;
            document.getElementById('clap-count').innerText = counts.clap;
            document.getElementById('like-count').innerText = counts.like;
        }

        function addComment() {
            const commentInput = document.getElementById('commentInput');
            const commentText = commentInput.value.trim();

            if (commentText === "") {
                alert("الرجاء كتابة تعليق أولاً!");
                return;
            }

            let comments = JSON.parse(localStorage.getItem('myComments')) || [];
            comments.unshift(commentText);
            localStorage.setItem('myComments', JSON.stringify(comments));

            displayComments(comments);
            commentInput.value = "";
        }

        function loadComments() {
            let comments = JSON.parse(localStorage.getItem('myComments')) || [];
            displayComments(comments);
        }

        function displayComments(comments) {
            const commentsList = document.getElementById('commentsList');
            commentsList.innerHTML = "";

            if(comments.length === 0) {
                commentsList.innerHTML = '<div class="comment-item" style="border-right-color: #ccc;">كن أول من يعلق هنا! 👋</div>';
                return;
            }

            comments.forEach(function(text) {
                const commentItem = document.createElement('div');
                commentItem.className = 'comment-item';
                commentItem.innerText = text;
                commentsList.appendChild(commentItem);
            });
        }
    </script>
</body>
</html>
